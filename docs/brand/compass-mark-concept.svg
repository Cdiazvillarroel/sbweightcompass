<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Compass mark concept">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15B981"/>
      <stop offset="1" stop-color="#0EA672"/>
    </linearGradient>
  </defs>

  <!-- soft background tint -->
  <rect width="240" height="240" rx="40" fill="#ECFBF4"/>

  <!-- bezel ring -->
  <circle cx="120" cy="120" r="78" fill="none" stroke="url(#ring)" stroke-width="10"/>

  <!-- cardinal ticks -->
  <g stroke="#0B3D33" stroke-width="4" stroke-linecap="round" opacity="0.55">
    <line x1="120" y1="30" x2="120" y2="44"/>
    <line x1="120" y1="196" x2="120" y2="210"/>
    <line x1="30" y1="120" x2="44" y2="120"/>
    <line x1="196" y1="120" x2="210" y2="120"/>
  </g>

  <!-- needle: north half (amber, wayfinding), south half (deep green) -->
  <polygon points="120,52 138,120 120,128 102,120" fill="#E0A340"/>
  <polygon points="120,188 138,120 120,112 102,120" fill="#0B3D33"/>

  <!-- hub -->
  <circle cx="120" cy="120" r="9" fill="#FFFFFF" stroke="#0B3D33" stroke-width="3"/>
</svg>
